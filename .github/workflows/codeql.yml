# CodeQL advanced setup.
#
# Migrated from CodeQL default setup 2026-05-18 LATE to gain Rust coverage —
# default setup's supported-language list does not include `rust`, but advanced
# setup does. This file owns the configuration that default setup used to
# manage automatically; SHA pins must be kept current (Dependabot's
# github-actions ecosystem covers bumps) and the matrix must be revisited
# whenever languages or platforms change in the codebase.
#
# Languages scanned:
#   - actions             — workflow YAML, GitHub Actions security queries
#   - javascript-typescript  — Node server + browser client + scripts/
#   - rust (ubuntu-latest) — launcher/tray/common cross-platform + cfg(unix) paths
#   - rust (windows-latest) — launcher/tray/common cfg(windows) paths
#
# Rust uses build-mode: none — CodeQL Rust extractor reads source directly
# without invoking cargo build. Verified empirically 2026-05-18 LATE: the
# autobuild mode returns "Rust does not support the autobuild build mode.
# Please try using one of the following build modes instead: none." So `none`
# is the ONLY valid mode for Rust today (per CodeQL 2.25.4). No rust-toolchain
# install step is needed since no compilation happens.
#
# The two-OS Rust matrix exists because launcher + tray code is heavily
# `cfg(windows)`-gated (14 cfg blocks in launcher/src alone) and the tray
# crate's `windows` dep is unconditional in the dep tree but only compiles
# meaningful code on Windows targets. With build-mode: none, CodeQL extracts
# all source files regardless of cfg gates, so technically both OS legs may
# see the same source. We keep both for now because:
#   (a) future CodeQL versions may add per-target extraction, and
#   (b) cost is small — extraction without build is fast.
# Revisit when CodeQL ships proper Rust autobuild + target-platform support.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 13 * * 1'  # Monday 09:00 ET (13:00 UTC during DST) — matches dependabot.yml cadence

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }}${{ matrix.os-label && format(' / {0}', matrix.os-label) || '' }})
    runs-on: ${{ matrix.os }}
    permissions:
      security-events: write   # Upload SARIF analysis results
      packages: read           # Read packages for dependency resolution
      actions: read            # Read workflow runs for category metadata
      contents: read           # Read the checked-out repo
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
            os: ubuntu-latest
            os-label: ''
            category-suffix: ''
          - language: javascript-typescript
            build-mode: none
            os: ubuntu-latest
            os-label: ''
            category-suffix: ''
          - language: rust
            build-mode: none
            os: ubuntu-latest
            os-label: 'ubuntu-latest'
            category-suffix: '-linux'
          - language: rust
            build-mode: none
            os: windows-latest
            os-label: 'windows-latest'
            category-suffix: '-windows'

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # query-suite: default (omitted — uses CodeQL's curated default suite)

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          category: "/language:${{ matrix.language }}${{ matrix.category-suffix }}"
