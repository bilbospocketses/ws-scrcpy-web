name: Release

on:
  push:
    tags: ['v*']

# Workflow-level default permissions. Per-job blocks override with their
# own narrower writes (id-token + attestations on build legs, contents:write
# on publish). The prepare leg inherits this read-only default. Closes
# OpenSSF Scorecard alert #16 (TokenPermissionsID, no topLevel permission
# defined) — see §31 in todo_ws_scrcpy_web.md.
permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Only needs to read the checked-out tag — no writes
    outputs:
      channel: ${{ steps.channel.outputs.channel }}
      signing_mode: ${{ steps.signing.outputs.mode }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
      - id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - id: channel
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-beta* ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          fi
      - id: signing
        env:
          # Generic signing-mode gate. Set this secret when a code-signing
          # path is wired in (was SIGNPATH_API_TOKEN until SignPath Foundation
          # declined the OSS application — see CHANGELOG [Unreleased]).
          # Renamed so a successor signer can plug in without further renaming.
          SIGNING_API_TOKEN: ${{ secrets.SIGNING_API_TOKEN }}
        run: |
          if [ -n "$SIGNING_API_TOKEN" ]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
          else
            echo "mode=unsigned" >> "$GITHUB_OUTPUT"
          fi
      - run: node scripts/assert-version-sync.mjs ${{ github.ref_name }}

  build-windows:
    needs: prepare
    runs-on: windows-latest
    permissions:
      id-token: write       # Sigstore OIDC for attest-build-provenance
      attestations: write   # Write attestation to repo via Attestations API
      contents: read        # Explicit (per-job block replaces defaults)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: npm
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.x
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      # vpk 1.2.0 (stable) has --msi / --instLocation and produces
      # true Windows Installer MSIs. Match the npm `velopack` package
      # version to keep client/server serialization in sync.
      - run: dotnet tool install -g vpk --version 1.2.0
      - run: npm ci --omit=dev
      - run: npm run build
      - run: cargo build --release --workspace
      - run: node scripts/fetch-servy.mjs
      - name: Fetch + stage seed Node binary (first-run bootstrap)
        run: node scripts/fetch-node.mjs
      - run: node scripts/stage-publish.mjs

      - name: Upload unsigned exes
        if: needs.prepare.outputs.signing_mode == 'signed'
        id: upload-unsigned-exes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-windows-exes
          path: |
            publish/ws-scrcpy-web-launcher.exe
            publish/ws-scrcpy-web-tray.exe
      # FUTURE SIGNER: wire the inner-exes signing step here.
      #   Input  — artifact `unsigned-windows-exes` (uploaded above when signing_mode == 'signed').
      #   Output — signed `ws-scrcpy-web-launcher.exe` + `ws-scrcpy-web-tray.exe` placed in `publish/`
      #            before the `vpk pack` step below picks them up.
      # Previous implementation used `signpath/github-action-submit-signing-request@v2`; SignPath
      # Foundation declined the OSS application (see CHANGELOG [Unreleased]). Replace this comment
      # block with the chosen signer's action when a path is selected.

      - name: vpk pack (PerMachine MSI)
        shell: pwsh
        run: |
          # Phase 4 of the Program Files migration: PerMachine MSI is
          # the only Windows install artifact. The MSI installs to
          # C:\Program Files\WsScrcpyWeb\ and runs elevated; the
          # launcher's veloapp-install hook grants the ProgramData
          # ACL (Authenticated Users:Modify (OI)(CI)) at install
          # time. v0.1.22 dropped Setup.exe (vpk still emits one as a
          # side effect of `--msi`; we just don't publish it).
          vpk pack `
            --packId WsScrcpyWeb `
            --packVersion ${{ needs.prepare.outputs.version }} `
            --packDir publish `
            --mainExe ws-scrcpy-web-launcher.exe `
            --packTitle "ws-scrcpy-web" `
            --packAuthors "ws-scrcpy-web contributors" `
            --channel ${{ needs.prepare.outputs.channel }} `
            --icon assets/tray-icon.ico `
            --msi `
            --instLocation PerMachine `
            -o Releases

      - name: Upload unsigned MSI
        if: needs.prepare.outputs.signing_mode == 'signed'
        id: upload-unsigned-msi
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-windows-msi
          path: Releases/*.msi
      # FUTURE SIGNER: wire the MSI signing step here.
      #   Input  — artifact `unsigned-windows-msi` (uploaded above when signing_mode == 'signed').
      #   Output — signed `*.msi` placed back into `Releases/` for the publish job to upload.
      # Same Authenticode policy that signs the inner exes generally signs the MSI as well; if the
      # chosen signer requires a separate policy/profile for MSI vs PE, split them when wiring.
      # Previous implementation used `signpath/github-action-submit-signing-request@v2`.

      # Generate Sigstore-backed build-provenance attestations for the Windows
      # release artifacts. Links each artifact to its workflow run + commit +
      # actor. Verify post-publish with:
      #   gh attestation verify <artifact> --repo bilbospocketses/ws-scrcpy-web
      # FUTURE SIGNER: when Authenticode signing lands above, this step then
      # covers the signed MSI rather than the unsigned one — attestation
      # subject is the file content at this step's evaluation time.
      - name: Attest Windows build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            Releases/*.msi
            Releases/*-Portable.zip
            Releases/*.nupkg

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-final
          path: |
            Releases/*.msi
            Releases/*-Portable.zip
            Releases/*.nupkg
            Releases/releases.${{ needs.prepare.outputs.channel }}.json

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # Sigstore OIDC for attest-build-provenance
      attestations: write   # Write attestation to repo via Attestations API
      contents: read        # Explicit (per-job block replaces defaults)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: npm
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.x
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl-tools (linker for musl target)
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      # vpk 1.2.0 (stable) has --msi / --instLocation and produces
      # true Windows Installer MSIs. Match the npm `velopack` package
      # version to keep client/server serialization in sync.
      - run: dotnet tool install -g vpk --version 1.2.0
      - run: npm ci --omit=dev
      - run: npm run build
      - name: Build launcher (musl-static — no glibc dependency)
        run: cargo build --release --workspace --target x86_64-unknown-linux-musl
      - name: Verify launcher is statically linked
        run: |
          BIN=target/x86_64-unknown-linux-musl/release/ws-scrcpy-web-launcher
          file "$BIN"
          ldd "$BIN" || true   # ldd exits nonzero on a fully-static binary — that is the goal
      - name: Fetch + stage seed Node binary (first-run bootstrap)
        run: node scripts/fetch-node.mjs
      - run: node scripts/stage-publish.mjs
      - run: node scripts/package-linux.mjs

      - name: Upload unsigned AppImage
        if: needs.prepare.outputs.signing_mode == 'signed'
        id: upload-unsigned-appimage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-linux-appimage
          path: Releases/*.AppImage
      # FUTURE SIGNER: wire the AppImage signing step here (if a Linux signing path is selected).
      #   Input  — artifact `unsigned-linux-appimage` (uploaded above when signing_mode == 'signed').
      #   Output — detached signature `*.AppImage.sig` placed in `Releases/` next to the AppImage,
      #            for the publish job to upload alongside the binary.
      # Previous implementation used `signpath/github-action-submit-signing-request@v2` configured
      # for detached GPG; Trusted Signing / Azure Artifact Signing is Authenticode-only and cannot
      # cover Linux. A self-managed GPG key in CI secrets is one viable replacement; another is to
      # ship Linux unsigned and rely on `SHA256SUMS` only.

      # Generate Sigstore-backed build-provenance attestation for the AppImage.
      # Verify post-publish with:
      #   gh attestation verify <artifact>.AppImage --repo bilbospocketses/ws-scrcpy-web
      - name: Attest Linux build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'Releases/*.AppImage'

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-final
          path: |
            Releases/*.AppImage
            Releases/*.AppImage.sig
            Releases/*.nupkg
            Releases/releases.linux-${{ needs.prepare.outputs.channel }}.json

  publish:
    needs: [prepare, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          find . -type f \( -name '*.msi' -o -name '*.AppImage' -o -name '*.AppImage.sig' -o -name '*-Portable.zip' -o -name '*.nupkg' \) -exec sha256sum {} \; > ../SHA256SUMS
          cd ..
          cat SHA256SUMS

      - name: Generate release notes
        run: |
          UNSIGNED_FLAG=""
          if [ "${{ needs.prepare.outputs.signing_mode }}" = "unsigned" ]; then
            UNSIGNED_FLAG="--unsigned"
          fi
          node scripts/extract-changelog.mjs ${{ github.ref_name }} $UNSIGNED_FLAG > release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          # v0.1.23 (item 8 of §1e): no prerelease flag for beta tags. GitHub's
          # /releases/latest API endpoint EXCLUDES prereleases, and Velopack's
          # GithubSource queries that endpoint to find the latest release in
          # the configured channel — so flagging beta tags as prereleases
          # broke discovery for beta-channel users (they could never receive
          # in-app updates). Channel separation is already handled by
          # Velopack's per-channel releases.<channel>.json feed file (see
          # the `files:` block below); the prerelease flag was redundant
          # gating that ALSO broke discovery. Stable users on the stable
          # channel won't see beta releases because their feed file lists
          # only stable assets. See feedback_velopack_permachine_lessons.md
          # Gotcha 5 for the full diagnosis.
          #
          # make_latest: true — every published release explicitly claims the
          # Latest badge. Velopack's GithubSource queries /releases/latest to
          # discover the newest release in the configured channel, so the
          # Latest badge MUST track the most recent tag or in-app updates
          # silently no-op. The earlier 'legacy' value (intended to fix
          # releases-page sort drift) caused the Latest badge to stick at
          # v0.1.30-beta.9 across the entire beta.10-18 push on 2026-05-28,
          # making 9 newer betas invisible to auto-update.
          make_latest: true
          body_path: release-notes.md
          files: |
            artifacts/windows-final/*.msi
            artifacts/windows-final/*-Portable.zip
            artifacts/windows-final/*.nupkg
            artifacts/windows-final/releases.${{ needs.prepare.outputs.channel }}.json
            artifacts/linux-final/*.AppImage
            artifacts/linux-final/*.AppImage.sig
            artifacts/linux-final/*.nupkg
            artifacts/linux-final/releases.linux-${{ needs.prepare.outputs.channel }}.json
            SHA256SUMS
