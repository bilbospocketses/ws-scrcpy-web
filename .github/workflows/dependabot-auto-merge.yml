# Auto-merge Dependabot PRs.
#
# Patch/minor version bumps, security updates (any size), AND the grouped github-actions
# bump auto-merge once required status checks pass (--auto waits for green). Non-security
# MAJOR bumps are held with a needs-manual-review label (framework upgrades / breaking changes).

name: Dependabot auto-merge
on: pull_request

# Top-level read-only; the job narrows UP to the writes it needs. A top-level write
# token is flagged high-severity by OpenSSF Scorecard (TokenPermissionsID).
permissions:
  contents: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write        # gh pr merge --squash writes the default branch
      pull-requests: write   # enable auto-merge + label the PR
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Auto-merge patch/minor, any security update, or the grouped actions bump
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.ghsa-id != '' ||
          steps.metadata.outputs.dependency-group == 'actions'
        run: |
          # Live-state guard: the pull_request event payload is a snapshot from when
          # the event fired, so it can report "open" for a PR that was closed or
          # superseded before this job ran -- and `gh pr merge --auto` then fails with
          # "Pull request is closed". Re-check the CURRENT state right before enabling.
          state=$(gh pr view "$PR_URL" --json state --jq .state)
          if [ "$state" != "OPEN" ]; then
            echo "PR is $state (not OPEN) -- skipping auto-merge enable."
            exit 0
          fi
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
      - name: Hold non-security major bump for manual review
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-major' &&
          steps.metadata.outputs.ghsa-id == ''
        run: |
          gh pr edit "$PR_URL" --add-label "needs-manual-review"
          gh pr comment "$PR_URL" --body "Non-security major bump - auto-merge skipped; review and merge manually."
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
