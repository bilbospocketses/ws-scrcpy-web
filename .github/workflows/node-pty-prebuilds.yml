name: node-pty prebuilds

on:
  schedule:
    - cron: '0 9 * * 1'       # Mondays 09:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Force matrix run even when precheck reports no version delta'
        type: boolean
        default: false

# Workflow-level default permissions. The publish + open-issue-on-failure
# jobs override with their own narrower writes (per the Tier 1 hardening pass);
# precheck + build legs inherit this read-only default. Closes the two
# `actions/missing-workflow-permissions` CodeQL alerts surfaced post-migration
# to advanced setup (alert #3 on precheck, #5 on build).
permissions:
  contents: read

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      node_pty_version: ${{ steps.check.outputs.node_pty_version }}
      current_node_version: ${{ steps.check.outputs.current_node_version }}
      current_node_version_bare: ${{ steps.check.outputs.current_node_version_bare }}
      current_node_abi: ${{ steps.check.outputs.current_node_abi }}
      prior_node_version: ${{ steps.check.outputs.prior_node_version }}
      prior_node_version_bare: ${{ steps.check.outputs.prior_node_version_bare }}
      prior_node_abi: ${{ steps.check.outputs.prior_node_abi }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - id: check
        run: |
          set +e
          node scripts/compute-matrix-versions.mjs > /tmp/check.json
          RC=$?
          set -e
          if [ "${{ inputs.force }}" = "true" ]; then
            CHANGED=true
          else
            CHANGED=$([ "$RC" = "1" ] && echo "true" || echo "false")
          fi
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          jq -r '.fresh | "node_pty_version=\(.nodePtyVersion)"' /tmp/check.json >> "$GITHUB_OUTPUT"
          jq -r '.fresh.nodeCurrentLts | "current_node_version=\(.version)\ncurrent_node_abi=\(.abi)"' /tmp/check.json >> "$GITHUB_OUTPUT"
          jq -r '.fresh.nodePriorLts | "prior_node_version=\(.version)\nprior_node_abi=\(.abi)"' /tmp/check.json >> "$GITHUB_OUTPUT"
          # v-stripped forms for Docker Hub tags (node:24.15.0-alpine etc.)
          jq -r '.fresh.nodeCurrentLts.version | sub("^v"; "") | "current_node_version_bare=\(.)"' /tmp/check.json >> "$GITHUB_OUTPUT"
          jq -r '.fresh.nodePriorLts.version | sub("^v"; "") | "prior_node_version_bare=\(.)"' /tmp/check.json >> "$GITHUB_OUTPUT"

  build:
    needs: precheck
    if: needs.precheck.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        # NOTE: linux-arm64-musl (Alpine on ARM64) is intentionally absent.
        # GitHub Actions cannot run JavaScript actions (checkout, setup-node,
        # upload-artifact, etc.) inside an Alpine container on ARM64 runners —
        # they require glibc. Users on arm64+musl fall back to compile-at-install
        # via the resolver's normal chain. See actions/runner#801.
        include:
          - { os: windows-latest,    arch: x64,   libc: '',    abi_label: current, container: '' }
          - { os: windows-latest,    arch: x64,   libc: '',    abi_label: prior,   container: '' }
          - { os: windows-11-arm,    arch: arm64, libc: '',    abi_label: current, container: '' }
          - { os: windows-11-arm,    arch: arm64, libc: '',    abi_label: prior,   container: '' }
          - { os: ubuntu-latest,     arch: x64,   libc: glibc, abi_label: current, container: '' }
          - { os: ubuntu-latest,     arch: x64,   libc: glibc, abi_label: prior,   container: '' }
          - { os: ubuntu-24.04-arm,  arch: arm64, libc: glibc, abi_label: current, container: '' }
          - { os: ubuntu-24.04-arm,  arch: arm64, libc: glibc, abi_label: prior,   container: '' }
          - { os: ubuntu-latest,     arch: x64,   libc: musl,  abi_label: current, container: 'alpine' }
          - { os: ubuntu-latest,     arch: x64,   libc: musl,  abi_label: prior,   container: 'alpine' }
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container == 'alpine' && format('node:{0}-alpine', matrix.abi_label == 'current' && needs.precheck.outputs.current_node_version_bare || needs.precheck.outputs.prior_node_version_bare) || null }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install build toolchain (Alpine)
        if: matrix.container == 'alpine'
        run: apk add --no-cache bash python3 make g++ tar gzip

      - name: Setup Node (non-Alpine)
        if: matrix.container == ''
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.abi_label == 'current' && needs.precheck.outputs.current_node_version || needs.precheck.outputs.prior_node_version }}

      - name: Upgrade npm for VS 2026 detection (Windows non-Alpine)
        # node-pty's install script is `node scripts/prebuild.js || node-gyp rebuild`.
        # prebuild.js does `require('node-gyp')` which resolves via Node module
        # resolution to npm's BUNDLED node-gyp at <npm-prefix>/node_modules/npm/
        # node_modules/node-gyp — NOT a globally-installed node-gyp, and NOT the
        # `npm_config_node_gyp` env var (that only affects npm's own invocation
        # route, e.g. `npm rebuild`, not third-party scripts).
        #
        # Node 22 LTS ships npm 10.9.8 which bundles node-gyp 11.5.0; that version
        # doesn't recognize VS 2026 (internal version 18) and rejects the runner's
        # VS install as `unknown version "undefined"`. npm 11.14.1 bundles node-gyp
        # 12.3.0 (added VS 2026 support in 12.1.0, 2025-11-12). Upgrading npm
        # itself replaces the bundled node-gyp, so require('node-gyp') in
        # third-party install scripts picks up the new version.
        #
        # windows-latest is being redirected to windows-2025-vs2026 (MS migration,
        # full cutover 2026-06-15) which ships only VS 2026. Linux legs use gcc/g++
        # and are unaffected. Gate to all Windows non-Alpine legs to future-proof
        # the ARM runners against the same image migration.
        if: matrix.container == '' && runner.os == 'Windows'
        shell: bash
        run: |
          set -ex
          npm install -g npm@11.14.1
          npm --version  # expect 11.14.1 (which bundles node-gyp 12.3.0)

      - name: Build node-pty prebuilt
        shell: bash
        run: |
          set -ex
          echo "--- runner diagnostics ---"
          node --version
          npm --version
          python --version 2>&1 || python3 --version 2>&1 || echo "no python on PATH"
          if [ "${{ runner.os }}" = "Windows" ]; then
            where cl.exe 2>&1 || echo "no cl.exe on PATH"
          fi
          echo "--- /runner diagnostics ---"

          UPSTREAM_VER="${{ needs.precheck.outputs.node_pty_version }}"
          ABI="${{ matrix.abi_label == 'current' && needs.precheck.outputs.current_node_abi || needs.precheck.outputs.prior_node_abi }}"
          PLATFORM="${{ startsWith(matrix.os, 'windows') && 'win32' || 'linux' }}"
          ARCH="${{ matrix.arch }}"
          LIBC_SUFFIX=""
          if [ "$PLATFORM" = "linux" ]; then LIBC_SUFFIX="-${{ matrix.libc }}"; fi
          KEY="node-pty-v${UPSTREAM_VER}-node-abi${ABI}-${PLATFORM}-${ARCH}${LIBC_SUFFIX}"

          mkdir build && cd build
          npm init -y
          # --build-from-source guarantees the binary lands at build/Release/pty.node
          # and that we are not repackaging upstream's prebuilts.
          npm install --no-save --build-from-source "node-pty@${UPSTREAM_VER}"

          echo "--- node-pty install layout ---"
          find node_modules/node-pty -name '*.node' -o -name '*.dll' -o -name '*.exe' | sort
          echo "--- /node-pty install layout ---"

          PACK_DIR="../artifacts/${KEY}"
          mkdir -p "$PACK_DIR"
          # cp -r captures everything build/Release emits: pty.node, conpty.node,
          # conpty_console_list.node, the conpty/ subdir (OpenConsole.exe + conpty.dll),
          # winpty DLLs/EXEs on Windows; pty.node on Linux. Future-proof against
          # upstream node-pty adding more build artifacts.
          cp -r node_modules/node-pty/build/Release/. "$PACK_DIR/"

          cd ../artifacts
          tar -czf "${KEY}.tar.gz" "${KEY}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${KEY}.tar.gz" > "${KEY}.tar.gz.sha256"
          else
            shasum -a 256 "${KEY}.tar.gz" > "${KEY}.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prebuilt-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.libc }}-${{ matrix.abi_label }}
          path: artifacts/*

  publish:
    needs: [precheck, build]
    if: needs.precheck.outputs.changed == 'true' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # softprops/action-gh-release creates the release; final step pushes the state-file commit to main
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: downloaded
          pattern: prebuilt-*
          merge-multiple: true

      - name: Build SHA256SUMS + manifest
        run: |
          cd downloaded
          cat *.sha256 > SHA256SUMS
          rm -f *.sha256
          UPSTREAM_VER="${{ needs.precheck.outputs.node_pty_version }}"
          CURRENT_ABI="${{ needs.precheck.outputs.current_node_abi }}"
          PRIOR_ABI="${{ needs.precheck.outputs.prior_node_abi }}"
          cat > manifest.json <<JSON
          {
            "upstreamVersion": "${UPSTREAM_VER}",
            "coveredAbis": ["${CURRENT_ABI}", "${PRIOR_ABI}"]
          }
          JSON
          ls -la

      - name: Write fresh state file
        # precheck runs on a different runner; its in-memory write of the
        # state file is lost by the time we checkout fresh here. Regenerate
        # from precheck outputs so the commit step below has a real diff.
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > .github/state/node-pty-prebuilds-state.json <<JSON
          {
            "nodePtyVersion": "${{ needs.precheck.outputs.node_pty_version }}",
            "nodeCurrentLts": {
              "version": "${{ needs.precheck.outputs.current_node_version }}",
              "abi": "${{ needs.precheck.outputs.current_node_abi }}"
            },
            "nodePriorLts": {
              "version": "${{ needs.precheck.outputs.prior_node_version }}",
              "abi": "${{ needs.precheck.outputs.prior_node_abi }}"
            },
            "lastBuiltAt": "${TIMESTAMP}"
          }
          JSON

      - name: Create versioned release
        # Runs before the state-file commit so release asset uploads are not
        # blocked by a git push race (main can move during the matrix run).
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: node-pty-prebuilds-v${{ needs.precheck.outputs.node_pty_version }}
          name: "node-pty prebuilds v${{ needs.precheck.outputs.node_pty_version }}"
          files: |
            downloaded/*.tar.gz
            downloaded/SHA256SUMS
            downloaded/manifest.json
          body: |
            Prebuilt node-pty binaries for ws-scrcpy-web's NodePtyResolver fallback.

            Upstream: microsoft/node-pty v${{ needs.precheck.outputs.node_pty_version }}
            Covered ABIs: current ${{ needs.precheck.outputs.current_node_abi }} (Node ${{ needs.precheck.outputs.current_node_version }}), prior ${{ needs.precheck.outputs.prior_node_abi }} (Node ${{ needs.precheck.outputs.prior_node_version }})
            Platforms: win32-x64, win32-arm64, linux-x64-glibc, linux-arm64-glibc, linux-x64-musl
            (linux-arm64-musl excluded — GH Actions JS-action runtime doesn't run in Alpine+arm64 containers; those users fall back to compile-at-install.)

      - name: Update "latest" alias
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: node-pty-prebuilds-latest
          name: "node-pty prebuilds (latest)"
          files: |
            downloaded/manifest.json
          body: "Manifest pointing at the latest published prebuild release."

      - name: Commit state file
        # Runs last so a race on main (docs/feature pushes landing mid-matrix)
        # doesn't block release-asset uploads. Rebase first to absorb any new
        # commits; if push still races, the release is already complete so the
        # state file drift is cosmetic and self-heals on the next run.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/node-pty-prebuilds-state.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(ci): bump node-pty prebuild state to node-pty v${{ needs.precheck.outputs.node_pty_version }}"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "push failed (attempt $attempt), retrying..."
            sleep 5
          done
          echo "::warning::state-file commit could not be pushed after 3 attempts; self-heals on next run"

  open-issue-on-failure:
    needs: [precheck, build, publish]
    if: failure() && needs.precheck.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write     # to file the prebuild-failure issue
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `prebuild-failure: node-pty matrix failed on ${date}`,
              body: `One or more matrix rows failed in workflow run ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}.

              Node-pty version: ${{ needs.precheck.outputs.node_pty_version }}
              Current Node: ${{ needs.precheck.outputs.current_node_version }} (ABI ${{ needs.precheck.outputs.current_node_abi }})
              Prior Node: ${{ needs.precheck.outputs.prior_node_version }} (ABI ${{ needs.precheck.outputs.prior_node_abi }})

              Check the failing rows and investigate (commonly: runner image change, upstream build script change, or missing system package).`,
              labels: ['prebuild-failure', 'ci'],
            });

  close-issue-on-success:
    # Symmetric pair to open-issue-on-failure. Closes any open prebuild-failure
    # issues when a subsequent matrix run completes successfully end-to-end
    # (build + publish both green). Gated on explicit success of both jobs so
    # "nothing changed, build skipped" runs don't auto-close real failure
    # signals. If the underlying problem re-emerges, open-issue-on-failure
    # files a fresh issue on the next run — no need to reopen.
    needs: [precheck, build, publish]
    if: needs.precheck.outputs.changed == 'true' && needs.build.result == 'success' && needs.publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      issues: write     # to comment + close prebuild-failure issues
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'prebuild-failure',
              per_page: 100,
            });
            for (const issue of openIssues) {
              if (issue.pull_request) continue;   // listForRepo also returns PRs
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Auto-closed by [run ${context.runId}](${runUrl}) — node-pty prebuild matrix completed successfully end-to-end.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }
